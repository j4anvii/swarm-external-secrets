name: Smoke Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [vault, openbao]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for ${{ matrix.provider }}
        run: bash scripts/tests/smoke-test-${{ matrix.provider }}.sh

  smoke-test-awssm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.2
        with:
          image-tag: 'latest'
          install-awslocal: 'true'

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for awssm
        run: bash scripts/tests/smoke-test-awssm.sh

  smoke-test-azure:
    runs-on: ubuntu-latest
    if: ${{ secrets.LOCALSTACK_AUTH_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install azlocal
        run: |
          pip install localstack
          localstack extensions install localstack-extension-azure-cli-local
          command -v azlocal
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for azure
        run: bash scripts/tests/smoke-test-azure.sh
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
